name: Docker Build and Run Check

on:
  pull_request:
    paths:
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/docker-build.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create mock .env file
        run: cp .env.example .env

      - name: Build with docker-compose
        run: docker compose build

      - name: Start services in background
        run: docker compose up -d

      - name: Wait for database to be healthy
        run: |
          echo "Waiting for database to be ready..."
          timeout 60s bash -c 'until docker compose ps | grep db | grep -q "(healthy)"; do sleep 2; done'
          
      - name: Verify Backend is running
        run: |
          echo "Waiting for backend to start..."
          # Give it a few seconds to start up after DB is ready
          sleep 10
          # Check if the process is still up and curl the root endpoint
          docker compose ps backend | grep "Up"
          curl -f --retry 5 --retry-connrefused --retry-delay 2 http://localhost:8000/health || (docker compose logs backend && exit 1)

      - name: Verify Frontend is running
        run: |
          echo "Waiting for frontend to start..."
          # Check if the process is still up and curl the frontend endpoint
          docker compose ps frontend | grep "Up"
          curl -f --retry 5 --retry-connrefused --retry-delay 2 http://localhost:3000/ || (docker compose logs frontend && exit 1)

      - name: Print logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down services
        if: always()
        run: docker compose down -v
