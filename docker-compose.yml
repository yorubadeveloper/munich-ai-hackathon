services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: huntagent
      POSTGRES_PASSWORD: huntagent
      POSTGRES_DB: huntagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huntagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/.venv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    user: "root"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    # Reconcile deps from the lockfile on every start, then run dev.
    # `npm ci` avoids rewriting package-lock.json on bind-mounted source.
    command: sh -c "npm ci --no-audit --no-fund && npm run dev"

volumes:
  pgdata:
  frontend_node_modules:
  frontend_next:
